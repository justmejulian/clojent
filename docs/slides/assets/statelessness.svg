  <rect x="276" y="388" width="56" height="40" rx="6" fill="#89b4fa" fill-opacity="0.15" stroke="#f9e2af" stroke-width="2"/>
  <text x="304" y="414" text-anchor="middle" font-size="18" fill="#89b4fa">U3</text>
  <line x1="344" y1="408" x2="366" y2="408" stroke="#9399b2" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="376" y="384" width="118" height="48" rx="10" fill="none" stroke="#cba6f7" stroke-width="2.5"/>
  <text x="435" y="408" text-anchor="middle" font-size="19" fill="#cba6f7" font-weight="600">LLM</text>
  <text x="435" y="426" text-anchor="middle" font-size="13" fill="#a6adc8">no state</text>

  <text x="260" y="510" text-anchor="middle" font-size="19" fill="#cdd6f4" font-style="italic">app resends the whole history, every turn</text>
</svg>
