<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9399b2"/>
    </marker>
    <marker id="arrAgent" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#cba6f7"/>
    </marker>
    <marker id="arrTool" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a6e3a1"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="180" height="510" rx="18" fill="#89b4fa" fill-opacity="0.08" stroke="#89b4fa" stroke-width="2"/>
  <rect x="220" y="20" width="420" height="510" rx="18" fill="#cba6f7" fill-opacity="0.08" stroke="#cba6f7" stroke-width="2"/>
  <rect x="660" y="20" width="300" height="510" rx="18" fill="#f9e2af" fill-opacity="0.08" stroke="#f9e2af" stroke-width="2"/>

  <text x="110" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#89b4fa">User</text>
  <text x="430" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#cba6f7">Agent</text>
  <text x="810" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#f9e2af">LLM</text>

  <rect x="50" y="120" width="120" height="64" rx="12" fill="#89b4fa" fill-opacity="0.14" stroke="#89b4fa" stroke-width="2.5"/>
  <text x="110" y="159" text-anchor="middle" font-size="21" fill="#89b4fa">type request</text>

  <rect x="270" y="105" width="320" height="96" rx="12" fill="#cba6f7" fill-opacity="0.14" stroke="#cba6f7" stroke-width="2.5"/>
  <text x="430" y="140" text-anchor="middle" font-size="22" fill="#cba6f7">append {:role "user"}</text>
  <text x="430" y="169" text-anchor="middle" font-size="20" fill="#cba6f7">resend history + tools</text>

  <rect x="710" y="120" width="200" height="64" rx="12" fill="#f9e2af" fill-opacity="0.14" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="810" y="159" text-anchor="middle" font-size="21" fill="#f9e2af">reply</text>

  <polygon points="810,230 900,285 810,340 720,285" fill="#f9e2af" fill-opacity="0.14" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="810" y="279" text-anchor="middle" font-size="20" fill="#f9e2af">tool_calls?</text>
  <text x="810" y="304" text-anchor="middle" font-size="16" fill="#f9e2af">or plain text</text>

  <rect x="280" y="372" width="300" height="88" rx="12" fill="#a6e3a1" fill-opacity="0.14" stroke="#a6e3a1" stroke-width="2.5"/>
  <text x="430" y="408" text-anchor="middle" font-size="22" fill="#a6e3a1">run tools</text>
  <text x="430" y="436" text-anchor="middle" font-size="19" fill="#a6e3a1">append {:role "tool"}</text>

  <rect x="50" y="406" width="120" height="60" rx="12" fill="#94e2d5" fill-opacity="0.14" stroke="#94e2d5" stroke-width="2.5"/>
  <text x="110" y="443" text-anchor="middle" font-size="21" fill="#94e2d5">see answer</text>

  <line x1="170" y1="152" x2="260" y2="152" stroke="#9399b2" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="590" y1="152" x2="700" y2="152" stroke="#9399b2" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="810" y1="184" x2="810" y2="222" stroke="#9399b2" stroke-width="2.5" marker-end="url(#arr)"/>

  <polyline points="720,285 620,285 620,416 580,416" fill="none" stroke="#a6e3a1" stroke-width="3" marker-end="url(#arrTool)"/>
  <text x="648" y="272" text-anchor="middle" font-size="18" fill="#a6e3a1">yes</text>

  <polyline points="430,372 430,330 430,210" fill="none" stroke="#cba6f7" stroke-width="3" marker-end="url(#arrAgent)"/>
  <text x="444" y="288" font-size="18" fill="#cba6f7">recur</text>

  <polyline points="810,340 810,506 170,506 170,436" fill="none" stroke="#9399b2" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="720" y="494" font-size="18" fill="#bac2de">no: plain text</text>

  <path d="M110,406 C110,344 110,286 110,192" fill="none" stroke="#89b4fa" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <text x="124" y="312" font-size="17" fill="#89b4fa">next turn</text>

  <text x="430" y="88" text-anchor="middle" font-size="17" fill="#bac2de">system prompt, history, tool registry live here</text>
</svg>
